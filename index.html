<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معاذ | Moaz Automation</title>
  <style>
    :root {
      --brand: #1a73e8;
      --brand-dark: #1557b0;
      --bg: #f5f7fa;
      --card: #fff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      margin: 0; 
      padding: 32px 16px; 
      text-align: center;
    }
    .container { 
      max-width: 680px; 
      margin: auto; 
      background: var(--card); 
      padding: 32px 24px; 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    h1 { font-size: 26px; margin: 0 0 8px; color: #111; }
    .sub { color: var(--muted); line-height: 1.8; margin-bottom: 20px; }
    
    /* زر الايميل الجديد */
    .btn-email {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--brand);
      color: #fff !important;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      transition: .2s;
    }
    .btn-email:hover { background: var(--brand-dark); transform: translateY(-1px); }

    /* كارت الفورم */
    .form-wrap {
      margin-top: 28px; 
      border-top: 1px solid var(--border); 
      padding-top: 24px;
      text-align: right;
    }
    .form-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; text-align: center; }
    
    /* هنا السحر: الفورم بدون ارتفاع ثابت */
    .form-frame {
      width: 100%;
      border: 0;
      border-radius: 12px;
      overflow: hidden;
    }

    hr { border: 0; border-top: 1px solid var(--border); margin: 28px 0; }

    /* تجربة المصنع */
    #builder input {
      padding: 12px; width: 60%; margin: 5px; 
      border: 1px solid var(--border); border-radius: 8px; font-size: 16px;
    }
    #builder button {
      padding: 12px 20px; background: var(--brand); color: #fff; 
      border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600;
    }
    #builder button:hover { background: var(--brand-dark); }
    #result2 { margin-top: 10px; color: var(--muted); }

  </style>
</head>
<body>

  <div class="container">
    <h1>معاذ | Moaz Automation</h1>
    <p class="sub">أقدم خدمات برمجة الأتمتة والذكاء الاصطناعي. 
    متخصص في بناء صفحات HTML سريعة ومتوافقة مع الهواتف للشركات والمتاجر.</p>
    
    <a class="btn-email" href="mailto:qportfoliosy@gmail.com">
      📧 qportfoliosy@gmail.com
    </a>

    <!-- فورم العملاء الجديد - جوجل فورم بدون سكرول -->
    <div class="form-wrap">
      <p class="form-title">احجز استشارة مجانية</p>
      <iframe 
        id="gform"
        class="form-frame"
        src="https://docs.google.com/forms/d/e/1FAIpQLSd-_qqad2pmeVJByhW6FrfR919C5aygtrhBBD86_G2nl_7T2A/viewform?embedded=true" 
        frameborder="0" 
        marginheight="0" 
        marginwidth="0">
        جاري التحميل...
      </iframe>
    </div>

    <hr>
    <!-- تجربة المصنع زي ما هي -->
    <form id="builder">
      <p><strong>تجربة المصنع:</strong> اكتب اسمك لعرض نموذج الصفحة</p>
      <input type="text" id="nameInput2" placeholder="الاسم" required>
      <button type="submit">عرض</button>
      <div id="result2"></div>
    </form>
  </div>

  <script>
    // 1. سكريبت Auto Height للفورم: بيشيل السكرول الداخلي
    const iframe = document.getElementById('gform');
    iframe.onload = function() {
      try {
        // بنحاول نجيب ارتفاع المحتوى جوه الفورم
        const body = iframe.contentWindow.document.body;
        const html = iframe.contentWindow.documentElement;
        const height = Math.max(body.scrollHeight, body.offsetHeight, html.clientHeight, html.scrollHeight, html.offsetHeight);
        iframe.style.height = height + 'px';
      } catch (e) {
        // لو جوجل منعت الوصول Cross-Origin، بنخليه 1100px كحل احتياطي
        iframe.style.height = '1100px'; 
      }
    };

    // 2. تجربة المصنع زي ما هي ماتغيرتش
    document.getElementById('builder').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('nameInput2').value;
      document.getElementById('result2').innerHTML = 
        `مرحباً، أنا ${name}. هذا نموذج صفحة جاهز.`;
    });
  </script>

</body>
</html>
