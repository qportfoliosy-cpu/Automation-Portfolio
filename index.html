<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معاذ | خدمات أتمتة</title>
  <style>
    body { 
      background: #f5f5f5; 
      color: #222; 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      margin: 0; 
      padding: 40px 20px; 
      text-align: center;
    }
    .container { 
      max-width: 600px; 
      margin: auto; 
      background: #fff; 
      padding: 30px; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
    }
    h1 { font-size: 24px; margin-bottom: 10px; color: #111; }
    p { line-height: 1.8; color: #444; }
    a { color:#1a73e8; text-decoration:none; }
    
    /* كود الفورم مظبوط 100% للموبايل */
    .form-container {
      margin-top: 30px; 
      border-top: 1px solid #eee; 
      padding-top: 20px;
    }
    .form-container iframe {
      width: 100%;
      max-width: 100%;
      border: none;
      height: 700px; /* خليته في ال CSS عشان يبقى اسهل في التحكم */
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>معاذ | Moaz Automation</h1>
    <p>أقدم خدمات برمجة الأتمتة والذكاء الاصطناعي. 
    متخصص في بناء صفحات HTML سريعة ومتوافقة مع الهواتف للشركات والمتاجر.</p>
    
    <a href="mailto:qportfoliosy@gmail.com">qportfoliosy@gmail.com</a>

    <!-- فورم العملاء الجديد - جوجل فورم -->
    <div class="form-container">
      <p><strong>احجز استشارة مجانية:</strong></p>
      <iframe 
        src="https://docs.google.com/forms/d/e/1FAIpQLSd-_qqad2pmeVJByhW6FrfR919C5aygtrhBBD86_G2nl_7T2A/viewform?embedded=true" 
        frameborder="0" 
        marginheight="0" 
        marginwidth="0">
        جاري التحميل...
      </iframe>
    </div>

    <hr style="margin:30px 0;">
    <!-- تجربة المصنع زي ما هي -->
    <form id="builder">
      <p><strong>تجربة المصنع:</strong> اكتب اسمك لعرض نموذج الصفحة</p>
      <input type="text" id="nameInput2" placeholder="الاسم" required style="padding: 10px; width: 60%; margin: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
      <button type="submit" style="padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">عرض</button>
      <div id="result2"></div>
    </form>
  </div>

  <script>
    // 2. تجربة المصنع زي ما هي ماتغيرتش
    document.getElementById('builder').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('nameInput2').value;
      document.getElementById('result2').innerHTML = 
        `مرحباً، أنا ${name}. هذا نموذج صفحة جاهز.`;
    });
  </script>

</body>
</html>
