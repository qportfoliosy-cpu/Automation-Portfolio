<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معاذ | خدمات أتمتة</title>
  <style>
    body { 
      background: #f5f5f5; 
      color: #222; 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      margin: 0; 
      padding: 40px 20px; 
      text-align: center;
    }
    .container { 
      max-width: 600px; 
      margin: auto; 
      background: #fff; 
      padding: 30px; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
    }
    h1 { font-size: 24px; margin-bottom: 10px; color: #111; }
    p { line-height: 1.8; color: #444; }
    form { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
    input { 
      padding: 10px; 
      width: 60%; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      font-size: 16px;
    }
    button { 
      padding: 10px 20px; 
      background: #1a73e8; 
      color: #fff; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 16px;
    }
    #result { margin-top: 20px; font-weight: bold; color: #1a73e8; }
  </style>
</head>
<body>

  <div class="container">
    <h1>معاذ | Moaz Automation</h1>
    <p>أقدم خدمات برمجة الأتمتة والذكاء الاصطناعي. 
    متخصص في بناء صفحات HTML سريعة ومتوافقة مع الهواتف للشركات والمتاجر.</p>
    
    <a href="mailto:qportfoliosy@gmail.com" style="color:#1a73e8; text-decoration:none;">
      qportfoliosy@gmail.com
    </a>

    <form id="builder">
      <p><strong>تجربة المصنع:</strong> اكتب اسمك لعرض نموذج الصفحة</p>
      <input type="text" id="nameInput" placeholder="الاسم" required>
      <button type="submit">عرض</button>
      <div id="result"></div>
    </form>
  </div>

  <script>
    document.getElementById('builder').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('nameInput').value;
      document.getElementById('result').innerHTML = 
        `مرحباً، أنا ${name}. هذا نموذج صفحة جاهز.`;
    });
  </script>

</body>
</html>
